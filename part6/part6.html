<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>잔재미코딩</title>
    <meta name="description" content="잔재미 온라인 강의 리스트" >
    <meta name="keywords" content="잔재미 코딩, 온라인 강의, IT 강의, 파이썬, 풀스택">
    <meta name="author" content="Dave Lee">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">


    <!-- Open Graph (Facebook, Linkedin)  -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="잔재미코딩">
    <meta property="og:description" content="잔재미코딩 온라인 강의 리스트">
    <meta property="og:image" content="img/fun-coding-mark.png">
    <meta property="og:url" content="https://www.fun-coding.org">
    <meta property="og:site_name" content="잔재미코딩">

    <!-- twitter card (Twitter)  -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="잔재미코딩">
    <meta name="twitter:description" content="잔재미코딩 온라인 강의 리스트">
    <meta name="twitter:image" content="img/fun-coding-mark.png">
    <meta name="twitter:url" content="https://www.fun-coding.org">
    <meta name="twitter:creator" content="Dave Lee">

    <!-- 일반적인 Favicon 설정  -->
    <link rel="icon" href="img/fun-coding.ico">
    <!-- 아이폰용 Favicon 설정  -->
    <link rel="apple-touch-icon" href="img/fun-coding.ico">
    <!-- internet explorer용 Favicon 설정  -->
    <link rel="short icon" type="image/x-icon" href="img/fun-coding.ico">

    <!-- CSS Reset -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reseter.css/1.0.8/reseter.min.css" integrity="sha512-w7sMEM5yzmuVP9ic9zpCLk/+whwrrhkH5g83x0wi5DEPo1y+/JniMmCVfbtjw5JipFpcCb4gyF2xLES6tc+TxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome(icon) -->
    <script src="https://kit.fontawesome.com/eb7e82094b.js" crossorigin="anonymous"></script>
    <!-- font setting -->
    <link href='//spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- CSS 작명 규칙(BEM : Block Element Modifier) -->
    <!--   - : 단어와 단어 사이에는 하이픈 (예 : head-container-blue)
            __ : ~의 하위 요소 (예 : head-container__head-brand)
            -- : ~의 상태를 나타낼 때 (예: head-container__head-brand--nolink)
    -->
    <header>
        <div class="inner">
            <div class="head-container">
                <div class="head-brand"><a href="https://www.fun-coding.org">인하대학교</a></div>
                <div class="head-blog"><a href="https://www.fun-coding.org/daveblog.html">인하대 빅데이터 동아리 IBAS</a></div>
            </div>
        </div>
    </header>

    <!-- main image section  -->
    <section class="main">
        <div class="main-container">
            <div class="inner">
                <div class="title-container">
                    <div class="title">친근한 분위기의 동아리</div>
                    <div class="message">
                        공부도 열심히 하고<br>
                        운동도 열심히 하고<br>
                        친구도 많은 사람들의 모임.
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section>
        <div class="inner">
            <div class="skill-container">
                <div class="skill">
                    <i class="fa-brands fa-python skill-icon python-style"></i>
                    <div class="skill-title">
                        <div class="skill-name">업무 자동화</div>
                        <div class="skill-usage">크롤링/자동매매</div>
                    </div>
                </div>
                <div class="skill">
                    <i class="far fa-chart-bar skill-icon anlysis style"></i>
                    <div class="skill-title">
                        <div class="skill-name">데이터 분석</div>
                        <div class="skill-usage">데이터 분석/SQL</div>
                    </div>
                </div>
                <div class="skill">
                    <i class="fab fa-app-store-ios skill-icon ai-style"></i>
                    <div class="skill-title">
                        <div class="skill-name">AI</div>
                        <div class="skill-usage">인공지능 활용</div>
                    </div>
                </div>
                <div class="skill">
                    <i class="fab fa-vuejs skill-icon vue-style"></i>
                    <div class="skill-title">
                        <div class="skill-name">풀스택</div>
                        <div class="skill-usage">웹/앱 서비스</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer></footer>
</body>
</html>
